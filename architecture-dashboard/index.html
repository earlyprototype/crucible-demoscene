<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Crucible v0.7 - 3D Architecture</title>
    <link rel="stylesheet" href="assets/css/architecture.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Three.js for 3D visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <!-- 3D Architecture Container -->
    <div class="architecture-container-3d" id="architecture-3d">
        <div class="header-3d">
            <div class="header-content">
                <h1>Project Crucible v0.7 - 3D Architecture</h1>
                <p>Interactive 3D Visualization</p>
                <div class="status-indicator">
                    <span class="status-dot active"></span>
                    <span class="status-text">3D System Active</span>
                </div>
            </div>
        </div>
        
        <!-- 3D Canvas Container -->
        <div id="three-container" class="three-container"></div>
        
        <!-- 3D Controls Overlay -->
        <div class="controls-overlay">
            <div class="control-hint">
                <i class="fas fa-mouse"></i> Drag to rotate • Scroll to zoom • Click to focus
            </div>
        </div>
    </div>

    <script src="assets/js/3d-architecture.js"></script>
</body>
</html>
